# ===========================
# Server
# ===========================
server.port=8080

# ===========================
# DataSource — MySQL (Railway)
# ===========================
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:tanloc_car_db}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# JWT
# ===========================
app.jwt.secret=${JWT_SECRET:tanloc-car-management-super-secret-key-change-in-production-2024}
app.jwt.expiration-ms=86400000

# ===========================
# File Upload
# ===========================
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=55MB

# ===========================
# CORS (configured in CorsConfig.java)
# ===========================
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}
